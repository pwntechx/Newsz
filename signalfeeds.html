<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL — Live Intelligence Feed</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap');

:root {
  --void: #090909;
  --surface: #111111;
  --raised: #181818;
  --border: #242424;
  --border-lit: #333333;
  --text: #e8e8e4;
  --dim: #888880;
  --ghost: #444440;
  --accent: #c8f060;
  --accent-dim: rgba(200,240,96,0.15);
  --accent-glow: rgba(200,240,96,0.06);
  --deal: #f0a030;
  --deal-dim: rgba(240,160,48,0.15);
  --red: #ff4444;
  --blue: #4a9eff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--void);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* GRAIN */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(9,9,9,0.96);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 0.25em;
  color: var(--accent);
}

.live-dot {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  color: var(--dim);
}

.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: blink 2s ease-in-out infinite;
}

.dot.loading { background: var(--deal); }
.dot.error { background: var(--red); animation: none; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.timestamp {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--ghost);
  letter-spacing: 0.1em;
}

.refresh-btn {
  background: var(--accent-dim);
  border: 1px solid rgba(200,240,96,0.3);
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.refresh-btn:hover {
  background: rgba(200,240,96,0.25);
  border-color: var(--accent);
}

.refresh-btn:active { transform: scale(0.97); }

.refresh-icon {
  display: inline-block;
  transition: transform 0.6s ease;
}

.refresh-btn.spinning .refresh-icon {
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* STATS BAR */
.stats-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 24px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  align-items: center;
}

.stat-item {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  display: flex;
  align-items: center;
  gap: 6px;
}

.stat-val { color: var(--accent); }
.stat-label { color: var(--ghost); }
.stat-item.deal-stat .stat-val { color: var(--deal); }

/* MAIN */
main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

/* LOADING STATE */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 20px;
}

.loading-bars {
  display: flex;
  gap: 4px;
  align-items: flex-end;
  height: 32px;
}

.loading-bar {
  width: 3px;
  background: var(--accent);
  border-radius: 2px;
  animation: bar-pulse 1.2s ease-in-out infinite;
}

.loading-bar:nth-child(1) { animation-delay: 0s; height: 40%; }
.loading-bar:nth-child(2) { animation-delay: 0.1s; height: 70%; }
.loading-bar:nth-child(3) { animation-delay: 0.2s; height: 100%; }
.loading-bar:nth-child(4) { animation-delay: 0.3s; height: 60%; }
.loading-bar:nth-child(5) { animation-delay: 0.4s; height: 80%; }
.loading-bar:nth-child(6) { animation-delay: 0.5s; height: 45%; }
.loading-bar:nth-child(7) { animation-delay: 0.6s; height: 90%; }

@keyframes bar-pulse {
  0%, 100% { opacity: 0.3; transform: scaleY(0.6); }
  50% { opacity: 1; transform: scaleY(1); }
}

.loading-text {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  color: var(--dim);
}

/* FEED GRID */
.feed-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1px;
  background: var(--border);
}

/* CARDS */
.card {
  background: var(--void);
  position: relative;
  overflow: hidden;
  transition: background 0.2s;
  opacity: 0;
  animation: card-in 0.4s ease forwards;
}

.card:hover { background: var(--surface); }

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.card.deal-card::before { background: var(--deal); }

.card:hover::before { transform: scaleX(1); }

@keyframes card-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
  filter: brightness(0.85) saturate(0.9);
  transition: filter 0.3s;
}

.card:hover .card-img { filter: brightness(0.95) saturate(1); }

.card-img-placeholder {
  width: 100%;
  height: 180px;
  background: var(--raised);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  opacity: 0.3;
}

.card-body {
  padding: 18px 20px 20px;
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.card-source {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
}

.card.deal-card .card-source { color: var(--deal); }

.card-time {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  color: var(--ghost);
  letter-spacing: 0.05em;
}

.card-title {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(0.95rem, 1.8vw, 1.1rem);
  line-height: 1.45;
  color: var(--text);
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-desc {
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem;
  font-weight: 400;
  color: var(--dim);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 14px;
}

.card-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  color: var(--ghost);
  text-decoration: none;
  transition: color 0.2s;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2px;
}

.card-link:hover { color: var(--accent); border-color: var(--accent); }
.card.deal-card .card-link:hover { color: var(--deal); border-color: var(--deal); }

/* DEAL PRICE */
.deal-price {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--deal);
  margin-bottom: 8px;
}

/* FEATURED CARD — first item is larger */
.card.featured {
  grid-column: span 2;
}

.card.featured .card-img { height: 260px; }
.card.featured .card-title { font-size: clamp(1.1rem, 2.5vw, 1.4rem); -webkit-line-clamp: 4; }

/* SOURCE FAILED */
.source-failed {
  display: none;
}

/* SECTION DIVIDER */
.section-divider {
  grid-column: 1 / -1;
  padding: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--void);
}

.divider-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--deal);
  white-space: nowrap;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(240,160,48,0.4), transparent);
}

/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  padding: 60px;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--ghost);
}

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 24px;
}

.footer-left {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  color: var(--ghost);
  line-height: 1.8;
}

.footer-right {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--accent);
}
.nav-back {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  color: var(--ghost);
  text-decoration: none;
  padding: 6px 12px;
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.nav-back:hover { color: var(--accent); border-color: var(--accent); }
  
@media (max-width: 720px) {
  .card.featured { grid-column: span 1; }
  .feed-grid { grid-template-columns: 1fr; }
  main { padding: 12px; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">SIGNAL</div>
    <div class="live-dot">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">INITIALIZING</span>
    </div>
  </div>
  <div class="header-right">
    <div class="timestamp" id="timestamp">--:--:--</div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAllFeeds()">
      <span class="refresh-icon">↻</span> REFRESH
    </button>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat-item"><span class="stat-val" id="statTotal">—</span><span class="stat-label">ARTICLES</span></div>
  <div class="stat-item"><span class="stat-val" id="statSources">—</span><span class="stat-label">LIVE SOURCES</span></div>
  <div class="stat-item"><span class="stat-val" id="statFailed">—</span><span class="stat-label">FAILED</span></div>
  <div class="stat-item deal-stat"><span class="stat-val" id="statDeals">—</span><span class="stat-label">DEALS</span></div>
  <div class="stat-item"><span class="stat-val" id="statAge">—</span><span class="stat-label">NEWEST</span></div>
</div>

<main id="main">
  <div class="loading-state" id="loadingState">
    <div class="loading-bars">
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">ACQUIRING SIGNAL</div>
  </div>
  <div class="feed-grid" id="feedGrid" style="display:none;"></div>
</main>

<footer>
  <div class="footer-left">
    SIGNAL · LIVE INTELLIGENCE FEED<br>
    SCIENCE · PHYSICS · TECHNOLOGY · ELECTRONICS · NATURE · DEALS
  </div>
  <div class="footer-right">E = 1</div>
</footer>

<script>
const COUNT = 12;
const CORS_PROXY = 'https://corsproxy.io/?';

async function fetchRSS(url) {
  const res = await fetch(CORS_PROXY + encodeURIComponent(url), {
    signal: AbortSignal.timeout(8000)
  });
  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'text/xml');
  const items = [...xml.querySelectorAll('item, entry')];
  return items.map(item => {
    const get = (tag) => item.querySelector(tag)?.textContent?.trim() || '';
    const getAttr = (tag, attr) => item.querySelector(tag)?.getAttribute(attr) || '';
    const mediaUrl = getAttr('media\\:thumbnail, media\\:content', 'url') ||
                     getAttr('enclosure', 'url') || '';
    const imgMatch = (get('description') + get('content')).match(/src="(https?:\/\/[^"]+\.(jpg|jpeg|png|webp)[^"]*)"/i);
    return {
      title: get('title'),
      description: get('description') || get('summary'),
      link: get('link') || getAttr('link', 'href'),
      pubDate: get('pubDate') || get('published') || get('updated'),
      thumbnail: mediaUrl || (imgMatch ? imgMatch[1] : ''),
      enclosure: { link: '' }
    };
  });
}

const SOURCES = [
  { name: 'NASA', url: 'https://www.nasa.gov/rss/dyn/breaking_news.rss', emoji: '🚀' },
  { name: 'Ars Technica', url: 'https://feeds.arstechnica.com/arstechnica/index', emoji: '⚡' },
  { name: 'Phys.org', url: 'https://phys.org/rss-feed/', emoji: '⚛️' },
  { name: 'New Scientist', url: 'https://www.newscientist.com/feed/home/', emoji: '🔬' },
  { name: 'The Verge', url: 'https://www.theverge.com/rss/index.xml', emoji: '💻' },
  { name: 'Nature', url: 'https://www.nature.com/nature.rss', emoji: '🌿' },
  { name: 'IEEE Spectrum', url: 'https://spectrum.ieee.org/feeds/feed.rss', emoji: '🔌' },
  { name: 'Science Daily', url: 'https://www.sciencedaily.com/rss/all.xml', emoji: '🧬' },
  { name: 'Wired', url: 'https://www.wired.com/feed/rss', emoji: '🌐' },
  { name: 'Space.com', url: 'https://www.space.com/feeds/all', emoji: '🌌' },
];

const DEAL_SOURCES = [
  { name: 'Slickdeals', url: 'https://slickdeals.net/newsearch.php?mode=frontpage&searcharea=deals&searchin=first&rss=1', emoji: '🏷️' },
  { name: 'Slickdeals Hot', url: 'https://slickdeals.net/newsearch.php?mode=popdeals&searcharea=deals&searchin=first&rss=1', emoji: '🔥' },
];

let allItems = [];
let dealItems = [];
let stats = { total: 0, sources: 0, failed: 0, deals: 0 };

function timeAgo(dateStr) {
  const date = new Date(dateStr);
  if (isNaN(date)) return '';
  const diff = (Date.now() - date) / 1000;
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function parseDate(item) {
  return new Date(item.pubDate || item.published || 0);
}

function cleanText(str) {
  if (!str) return '';
  return str.replace(/<[^>]*>/g, '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ').trim();
}

function getImage(item) {
  if (item.thumbnail && item.thumbnail.startsWith('http')) return item.thumbnail;
  if (item.enclosure && item.enclosure.link && item.enclosure.link.match(/\.(jpg|jpeg|png|webp)/i)) return item.enclosure.link;
  const match = (item.content || item.description || '').match(/src="(https?:\/\/[^"]+\.(jpg|jpeg|png|webp)[^"]*)"/i);
  if (match) return match[1];
  return null;
}

async function fetchFeed(source, isDeals = false) {
  try {
    const items = await fetchRSS(source.url);
    if (!items?.length) return null;
    return {
      source: source.name,
      emoji: source.emoji,
      isDeals,
      items: items.slice(0, COUNT).map(item => ({
        title: cleanText(item.title),
        description: cleanText(item.description || ''),
        link: item.link,
        pubDate: item.pubDate,
        image: cleanText(item.thumbnail) || getImage(item),
        source: source.name,
        emoji: source.emoji,
        isDeals,
      })).filter(i => i.title && i.link)
    };
  } catch {
    return null;
  }
}

function renderCard(item, index, isFirst) {
  const ago = timeAgo(item.pubDate);
  const img = item.image
    ? `<img class="card-img" src="${item.image}" alt="" loading="lazy" onerror="this.style.display='none';">`
    : ``;

  const featuredClass = isFirst && !item.isDeals ? ' featured' : '';
  const dealClass = item.isDeals ? ' deal-card' : '';
  const delay = Math.min(index * 40, 600);

  return `
    <div class="card${featuredClass}${dealClass}" style="animation-delay:${delay}ms">
      ${img}
      <div class="card-body">
        <div class="card-meta">
          <span class="card-source">${item.emoji} ${item.source}</span>
          <span class="card-time">${ago}</span>
        </div>
        <div class="card-title">${item.title}</div>
        ${item.description ? `<div class="card-desc">${item.description.substring(0,160)}${item.description.length>160?'…':''}</div>` : ''}
        <a class="card-link" href="${item.link}" target="_blank" rel="noopener">READ MORE →</a>
      </div>
    </div>`;
}

function updateClock() {
  const now = new Date();
  document.getElementById('timestamp').textContent =
    now.toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function updateStats() {
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statSources').textContent = stats.sources;
  document.getElementById('statFailed').textContent = stats.failed;
  document.getElementById('statDeals').textContent = stats.deals;

  if (allItems.length) {
    const newest = new Date(Math.max(...allItems.map(i => new Date(i.pubDate || 0))));
    document.getElementById('statAge').textContent = timeAgo(newest);
  }
}

async function loadAllFeeds() {
  const btn = document.getElementById('refreshBtn');
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const grid = document.getElementById('feedGrid');
  const loading = document.getElementById('loadingState');

  btn.classList.add('spinning');
  dot.className = 'dot loading';
  statusText.textContent = 'FETCHING';
  loading.style.display = 'flex';
  grid.style.display = 'none';
  allItems = [];
  dealItems = [];
  stats = { total: 0, sources: 0, failed: 0, deals: 0 };

  // Fetch all feeds in parallel
  const [newsResults, dealResults] = await Promise.all([
    Promise.all(SOURCES.map(s => fetchFeed(s, false))),
    Promise.all(DEAL_SOURCES.map(s => fetchFeed(s, true)))
  ]);

  // Process news
  newsResults.forEach(result => {
    if (result) {
      stats.sources++;
      allItems.push(...result.items);
    } else {
      stats.failed++;
    }
  });

  // Process deals
  dealResults.forEach(result => {
    if (result) {
      dealItems.push(...result.items);
      stats.deals += result.items.length;
    } else {
      stats.failed++;
    }
  });

  // Sort news by date descending
  allItems.sort((a, b) => parseDate(b) - parseDate(a));

  // Deduplicate by title
  const seen = new Set();
  allItems = allItems.filter(item => {
    const key = item.title.toLowerCase().substring(0, 60);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  dealItems.sort((a, b) => parseDate(b) - parseDate(a));
  stats.total = allItems.length;

  // Render
  loading.style.display = 'none';
  grid.style.display = 'grid';

  if (!allItems.length && !dealItems.length) {
    grid.innerHTML = '<div class="empty-state">NO SIGNAL ACQUIRED · CHECK CONNECTION · RETRY</div>';
    dot.className = 'dot error';
    statusText.textContent = 'NO SIGNAL';
    btn.classList.remove('spinning');
    updateStats();
    return;
  }

  let html = '';

  // News cards
  allItems.forEach((item, i) => {
    html += renderCard(item, i, i === 0);
  });

  // Deals divider + cards
  if (dealItems.length) {
    html += `
      <div class="section-divider">
        <span class="divider-label">🏷️ LATEST DEALS · SLICKDEALS</span>
        <div class="divider-line"></div>
      </div>`;
    dealItems.slice(0, 20).forEach((item, i) => {
      html += renderCard(item, i, false);
    });
  }

  grid.innerHTML = html;

  dot.className = 'dot';
  statusText.textContent = 'LIVE';
  btn.classList.remove('spinning');
  updateStats();
}

// Clock
setInterval(updateClock, 1000);
updateClock();

// Auto-refresh every 15 minutes
setInterval(loadAllFeeds, 15 * 60 * 1000);

// Initial load
loadAllFeeds();
</script>
</body>
</html>
